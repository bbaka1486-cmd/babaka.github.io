<p><strong>Останнє оновлення:</strong> 18 березня 2026</p>

<div class="box">
<strong>Важливо:</strong> Використовуючи STALKER Mobile, ви погоджуєтесь з цією політикою. Якщо не згодні — не встановлюйте гру.
