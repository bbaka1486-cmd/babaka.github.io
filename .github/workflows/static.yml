<h2>1. Які дані збираємо</h2>
<ul>
<li><strong>Email та пароль</strong> — для авторизації (пароль хешується)</li>
<li><strong>Ігровий нікнейм</strong> — публічне ім'я в грі</li>
<li><strong>Ігровий прогрес</strong> — позиція, інвентар, статистика</li>
<li><strong>ID пристрою</strong> — для захисту акаунта</li>
<li><strong>IP-адреса</strong> — анти-чит, безпека (зберігається 30 днів)</li>
<li><strong>Crash logs</strong> — для виправлення помилок</li>
</ul>

<h2>2. Навіщо використовуємо</h2>
<ul>
<li>Збереження прогресу на сервері</li>
<li>Захист від чітів та ботів</li>
<li>Відновлення доступу до акаунта</li>
<li>Покращення продуктивності гри</li>
</ul>

